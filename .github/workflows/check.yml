name: Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-and-tools:
    name: Python and tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m compileall .

      - name: Compile C todo lint utility
        run: |
          gcc tools/c/nbf-todo-lint.c -o /tmp/nbf-todo-lint

      - name: Smoke test Excel exporter
        run: |
          cat > /tmp/sample-todo.md <<'EOF'
          | Status | Priority | Task Description | Category | Deadline | Entry Date | Memo |
          | --- | --- | --- | --- | --- | --- | --- |
          | [ ] | P1 | Test Excel export | Testing | 2099-01-01 | 2026-05-24 | Generated by CI |
          | [x] | P3 | Test completed task | Testing | 2099-01-02 | 2026-05-24 | Done row |
          EOF
          python tools/export_todo_excel.py --input /tmp/sample-todo.md --output /tmp/nobrainfog-ci.xlsx
          test -s /tmp/nobrainfog-ci.xlsx

      - name: Smoke test C todo lint utility
        run: |
          /tmp/nbf-todo-lint /tmp/sample-todo.md
