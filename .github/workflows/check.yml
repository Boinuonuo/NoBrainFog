name: Check

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-and-tools:
    name: Python and tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m compileall .

      - name: Compile C todo lint utility
        run: |
          gcc tools/c/nbf-todo-lint.c -o /tmp/nbf-todo-lint

      - name: Prepare sample todo vault
        run: |
          cat > /tmp/sample-todo.md <<'EOF'
          | Status | Priority | Task Description | Category | Deadline | Entry Date | Memo |
          | --- | --- | --- | --- | --- | --- | --- |
          | [ ] | P1 | Test Excel export | Testing | 2099-01-01 | 2026-05-24 | Generated by CI |
          | [x] | P3 | Test completed task | Testing | 2099-01-02 | 2026-05-24 | Done row |
          EOF
          cat > /tmp/nbf-cli.env <<'EOF'
          MD_PATH=/tmp/sample-todo.md
          CATEGORIES=Testing
          EOF

      - name: Smoke test Excel exporter
        run: |
          python tools/export_todo_excel.py --input /tmp/sample-todo.md --output /tmp/nobrainfog-ci.xlsx
          test -s /tmp/nobrainfog-ci.xlsx

      - name: Smoke test C todo lint utility
        run: |
          /tmp/nbf-todo-lint /tmp/sample-todo.md

      - name: Smoke test CLI toolkit
        run: |
          python tools/nbf_cli.py --help
          python tools/nbf_cli.py --env-file /tmp/nbf-cli.env report
          python tools/nbf_cli.py --env-file /tmp/nbf-cli.env excel --output /tmp/nobrainfog-cli.xlsx
          test -s /tmp/nobrainfog-cli.xlsx
          python tools/nbf_cli.py --env-file /tmp/nbf-cli.env lint

      - name: Smoke test email parser
        run: |
          python - <<'PY'
          from core.email_parser import parse_email_string

          raw_plain = """From: sender@example.com
          Subject: Renewal notice
          Message-ID: <plain-test@example.com>
          Content-Type: text/plain; charset=utf-8

          Please remind me to renew the domain next Friday.

          -- 
          Signature should be removed.
          """
          parsed_plain = parse_email_string(raw_plain)
          assert parsed_plain.subject == "Renewal notice"
          assert "renew the domain" in parsed_plain.body
          assert "Signature should be removed" not in parsed_plain.body
          assert "Subject: Renewal notice" in parsed_plain.ingest_text

          raw_html = """From: sender@example.com
          Subject: HTML task
          Message-ID: <html-test@example.com>
          MIME-Version: 1.0
          Content-Type: text/html; charset=utf-8

          <html><body><p>Book dentist appointment.</p><blockquote>old reply</blockquote></body></html>
          """
          parsed_html = parse_email_string(raw_html)
          assert "Book dentist appointment" in parsed_html.body
          assert "Body:" in parsed_html.ingest_text
          PY

      - name: Smoke test email command aliases
        run: |
          python - <<'PY'
          from core.email_commands import parse_email_command

          cases = {
              "/export": "/export",
              "/e": "/export",
              "/exp": "/export",
              "/excel": "/excel",
              "/xlsx": "/excel",
              "/report": "/report",
              "/r": "/report",
              "/rep": "/report",
              "/help": "/help",
              "/h": "/help",
              "/ping": "/ping",
          }

          for raw, expected in cases.items():
              command = parse_email_command(subject=raw, body="")
              assert command is not None, raw
              assert command.name == expected, (raw, command.name, expected)

          assert parse_email_command(subject="normal task", body="") is None
          assert parse_email_command(subject="/export", body="normal body wins") is None
          PY
